<div class="flex flex-col items-center justify-center w-full px-4 py-8">
    <div class="w-full max-w-sm bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
        <!-- Logo Area -->
        <div class="flex flex-col items-center mb-8">
            <div
                class="w-16 h-16 bg-accent rounded-2xl flex items-center justify-center text-white mb-4 shadow-accent shadow-lg">
                <lucide-icon [img]="LogInIcon" class="w-8 h-8"></lucide-icon>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Bienvenido</h1>
            <p class="text-gray-500 text-sm mt-1">Inicia sesión para gestionar tu clínica</p>
        </div>

        <!-- Login Actions -->
        <div class="space-y-4">
            <!-- Error Message -->
            <div *ngIf="errorMessage()" class="p-3 mb-4 text-sm text-red-700 bg-red-100 rounded-lg" role="alert">
                <span class="font-medium">Error:</span> {{ errorMessage() }}
            </div>

            <form (ngSubmit)="onLogin()" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" [(ngModel)]="email" name="email" required
                        class="mt-1 block w-full rounded-lg border border-gray-300 shadow-sm focus:border-accent focus:ring-2 focus:ring-accent/20 sm:text-sm p-2.5 outline-none transition-all">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                    <input type="password" id="password" [(ngModel)]="password" name="password" required
                        class="mt-1 block w-full rounded-lg border border-gray-300 shadow-sm focus:border-accent focus:ring-2 focus:ring-accent/20 sm:text-sm p-2.5 outline-none transition-all">
                    <div class="flex justify-end mt-1">
                        <a routerLink="/auth/recover-password"
                            class="text-sm text-primary hover:text-primary">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>
                <button type="submit" [disabled]="isLoading()"
                    class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-sm font-bold text-white bg-accent hover:bg-indigo-700 shadow-accent shadow-md active:scale-95 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent disabled:opacity-60 disabled:cursor-not-allowed transition-all">
                    <lucide-icon *ngIf="isLoading()" [img]="LoaderIcon" class="w-4 h-4 animate-spin"></lucide-icon>
                    {{ isLoading() ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
                </button>
            </form>


            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-xs uppercase">Seguro & Privado</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <p class="text-center text-xs text-gray-400 px-4">
                Al ingresar aceptas nuestros <a href="#" class="text-primary hover:underline">Términos de Servicio</a>
                y <a href="#" class="text-primary hover:underline">Política de Privacidad</a>.
            </p>
        </div>
    </div>

    <div class="mt-8 text-center text-gray-400 text-sm">
        <p>© 2026 MediAgenda. Todos los derechos reservados.</p>
    </div>
</div>
