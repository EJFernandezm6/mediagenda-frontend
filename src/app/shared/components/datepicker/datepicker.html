<div class="relative w-full" [class.z-40]="isOpen()">
    <!-- Clickable Input Fake -->
    <div (click)="openDropdown()"
        class="flex items-center justify-between w-full h-11 px-4 transition-all cursor-pointer bg-white group"
        [ngClass]="[
            disabledState() ? 'bg-gray-100 opacity-60 cursor-not-allowed' : 'hover:bg-gray-50',
            borderless ? 'border-none' : 'border border-gray-300 rounded-lg shadow-sm'
        ]">

        <span [ngClass]="currentValue() ? 'text-gray-900 font-bold text-sm' : 'text-gray-400 text-sm font-medium'">
            {{ currentValue() || placeholder }}
        </span>

        <lucide-icon *ngIf="showIcon" [img]="icons.Calendar" class="w-4 h-4 text-gray-400 group-hover:text-accent transition-colors"></lucide-icon>
    </div>

    <!-- Dropdown Backdrop (Invisible overlay to detect clicks outside) -->
    <div *ngIf="isOpen()" class="fixed inset-0 z-[100] bg-black/5 backdrop-blur-[1px]" (click)="closeDropdown($event)"></div>

    <!-- Dropdown Panel -->
    <div *ngIf="isOpen()"
        class="absolute z-[101] mt-2 bg-white border border-gray-100 rounded-[1.5rem] shadow-2xl overflow-hidden w-[320px] origin-top animate-in fade-in slide-in-from-top-2 duration-200"
        [ngClass]="position === 'right' ? 'right-0 origin-top-right' : 'left-0 origin-top-left'">

        <!-- Header Controls -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-50 bg-white">
            <button (click)="prevMonth($event)" class="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-all active:scale-95">
                <lucide-icon [img]="icons.ChevronLeft" class="w-5 h-5"></lucide-icon>
            </button>
            <div class="font-black text-gray-950 text-sm tracking-wider">
                {{ currentMonthName }} {{ currentYear }}
            </div>
            <button (click)="nextMonth($event)" class="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-all active:scale-95">
                <lucide-icon [img]="icons.ChevronRight" class="w-5 h-5"></lucide-icon>
            </button>
        </div>

        <!-- Calendar Grid -->
        <div class="p-5">
            <!-- Week Days Header -->
            <div class="grid grid-cols-7 mb-4">
                <div *ngFor="let d of weekDays" class="text-center text-[10px] font-black text-gray-400 tracking-widest">
                    {{d}}
                </div>
            </div>

            <!-- Days Matrix -->
            <div class="space-y-1">
                <div class="grid grid-cols-7 gap-1" *ngFor="let week of calendarGrid()">
                    <button *ngFor="let day of week" (click)="selectDate(day)" [disabled]="!day.isEnabled" [ngClass]="{
                            'bg-accent text-white shadow-lg shadow-accent/30 font-black scale-105': day.isSelected && day.isCurrentMonth,
                            'hover:bg-accent/10 hover:text-accent': day.isEnabled && !day.isSelected && day.isCurrentMonth,
                            'text-gray-950 font-bold': day.isEnabled && !day.isSelected && day.isCurrentMonth && !day.isToday,
                            'text-accent font-black bg-accent/5 ring-1 ring-accent/20': day.isEnabled && !day.isSelected && day.isCurrentMonth && day.isToday,
                            'text-gray-300 cursor-not-allowed opacity-50': !day.isEnabled && day.isCurrentMonth,
                            'opacity-0 cursor-default pointer-events-none': !day.isCurrentMonth
                        }"
                        class="h-9 w-9 rounded-xl flex items-center justify-center text-[13px] transition-all focus:outline-none focus:ring-2 focus:ring-accent/50">
                        {{ day.isCurrentMonth ? day.dayOfMonth : '' }}
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Footer Info -->
        <div class="px-5 py-3 bg-gray-50/50 border-t border-gray-50 flex justify-center">
             <span class="text-[10px] font-bold text-gray-400 tracking-widest">Seleccione una fecha</span>
        </div>
    </div>
</div>
