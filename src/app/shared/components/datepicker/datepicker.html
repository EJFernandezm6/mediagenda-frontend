<div class="relative w-full" [class.z-40]="isOpen()">
    <!-- Clickable Input Fake -->
    <div (click)="openDropdown()"
        class="relative flex items-center w-full h-10 transition-all cursor-pointer bg-white group border border-gray-300 rounded-lg overflow-hidden"
        [ngClass]="[
            disabledState() ? 'bg-gray-100 opacity-60 cursor-not-allowed' : 'hover:bg-gray-50',
            borderless ? '!border-none !bg-transparent !h-auto' : '',
            isOpen() ? 'border-[#4F46E5] ring-2 ring-[#4F46E5]/20' : ''
        ]">

        <!-- Master Icon Alignment: Left-3 -->
        <div *ngIf="showIcon" class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
            <lucide-icon [img]="icons.Calendar" class="w-4 h-4 text-gray-400 group-hover:text-purple-600 transition-colors"></lucide-icon>
        </div>

        <span class="pr-4" [ngClass]="[
            showIcon ? 'pl-10' : 'pl-0',
            currentValue() ? 'text-gray-900 font-bold text-sm' : 'text-gray-400 text-sm font-medium'
        ]">
            {{ displayValue() || placeholder }}
        </span>
    </div>

    <!-- Dropdown Backdrop (Invisible overlay to detect clicks outside) -->
    <div *ngIf="isOpen()" class="fixed inset-0 z-40 bg-transparent" (click)="closeDropdown($event)"></div>

    <!-- Dropdown Panel -->
    <div *ngIf="isOpen()"
        class="absolute z-[9999] bg-white border border-gray-100 rounded-[1.5rem] shadow-2xl overflow-hidden w-[320px] animate-in fade-in duration-200"
        [ngClass]="{
            'mt-2 top-full focus:outline-none': direction === 'down',
            'mb-2 bottom-full origin-bottom focus:outline-none': direction === 'up',
            'left-0 origin-top-left': position === 'left' && direction === 'down',
            'right-0 origin-top-right': position === 'right' && direction === 'down',
            'left-0 origin-bottom-left': position === 'left' && direction === 'up',
            'right-0 origin-bottom-right': position === 'right' && direction === 'up'
        }">

        <!-- Header Controls -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-50 bg-white">
            <button (click)="prevMonth($event)" class="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-all active:scale-95">
                <lucide-icon [img]="icons.ChevronLeft" class="w-5 h-5"></lucide-icon>
            </button>
            <div class="font-black text-gray-950 text-sm tracking-wider">
                {{ currentMonthName }} {{ currentYear }}
            </div>
            <button (click)="nextMonth($event)" class="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-all active:scale-95">
                <lucide-icon [img]="icons.ChevronRight" class="w-5 h-5"></lucide-icon>
            </button>
        </div>

        <!-- Calendar Grid -->
        <div class="p-5">
            <!-- Week Days Header -->
            <div class="grid grid-cols-7 mb-4">
                <div *ngFor="let d of weekDays" class="text-center text-[10px] font-black text-gray-400 tracking-widest">
                    {{d}}
                </div>
            </div>

            <!-- Days Matrix -->
            <div class="space-y-1">
                <div class="grid grid-cols-7 gap-1" *ngFor="let week of calendarGrid()">
                    <button *ngFor="let day of week" (click)="selectDate(day)" [disabled]="!day.isEnabled" [ngClass]="{
                            'bg-accent text-white shadow-lg shadow-accent/30 font-black scale-105': day.isSelected && day.isCurrentMonth,
                            'hover:bg-indigo-50 text-gray-900 font-medium cursor-pointer': day.isEnabled && !day.isSelected && day.isCurrentMonth,
                            'text-gray-300 cursor-not-allowed': !day.isEnabled && day.isCurrentMonth,
                            'opacity-0 cursor-default pointer-events-none': !day.isCurrentMonth
                        }"
                        class="h-9 w-9 rounded-xl flex items-center justify-center text-[13px] transition-all focus:outline-none focus:ring-2 focus:ring-accent/50">
                        {{ day.isCurrentMonth ? day.dayOfMonth : '' }}
                    </button>
                </div>
            </div>
        </div>
        

    </div>
</div>
