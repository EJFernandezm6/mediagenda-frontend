<div [class]="cardClasses">
    <!-- Header -->
    <div *ngIf="headerSlot" class="px-6 py-4 border-b border-border-soft bg-gray-50/30">
        <ng-container *ngTemplateOutlet="headerSlot"></ng-container>
    </div>

    <!-- Body -->
    <div [class.p-6]="!noPadding" class="relative">
        <ng-content></ng-content>
    </div>

    <!-- Footer -->
    <div *ngIf="footerSlot" class="px-6 py-4 border-t border-border-soft bg-gray-50/10">
        <ng-container *ngTemplateOutlet="footerSlot"></ng-container>
    </div>
</div>

<!-- Template definitions for slots -->
<ng-template #headerSlot><ng-content select="[card-header]"></ng-content></ng-template>
<ng-template #footerSlot><ng-content select="[card-footer]"></ng-content></ng-template>
