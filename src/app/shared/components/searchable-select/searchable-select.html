<div class="relative w-full" [class.z-50]="isOpen()">


    <div class="relative z-40">
        <div class="relative">
            <input type="text" [value]="searchText()" (input)="onSearchChange($event)"
                (focus)="openDropdown()" [placeholder]="placeholder" [disabled]="disabledState()"
                class="block w-full rounded-xl border-border-main py-2.5 pl-3 pr-10 text-sm bg-white shadow-sm disabled:bg-muted/30 disabled:text-text-muted transition-all"
                [ngClass]="{'py-2': displayMode === 'compact', 'py-2.5': displayMode === 'default'}">

            <div class="absolute inset-y-0 right-0 flex items-center pr-2 gap-1">
                <!-- Clear Button -->
                <button *ngIf="currentValue() && !disabledState()" (click)="clearSelection($event)"
                    class="p-1 hover:bg-gray-100 rounded-full transition-colors">
                    <lucide-icon [img]="icons.X" class="h-3.5 w-3.5 text-gray-400 hover:text-red-500"></lucide-icon>
                </button>
                <lucide-icon [img]="icons.Search" class="h-4 w-4 text-text-light"></lucide-icon>
            </div>
        </div>

        <!-- Dropdown List -->
        <ul *ngIf="isOpen() && filteredOptions().length > 0"
            class="absolute z-50 mt-2 max-h-60 w-full overflow-auto rounded-xl bg-white py-1 text-sm shadow-xl border border-border-soft ring-0 focus:outline-none custom-scrollbar animate-in fade-in slide-in-from-top-2 duration-200">
            <li *ngFor="let option of filteredOptions()" (click)="selectOption(option)"
                [class]="'relative cursor-pointer select-none py-2.5 pl-4 pr-9 flex flex-col transition-all ' + 
                         (option.id === currentValue() ? 'bg-accent-soft text-accent' : 'text-text-main hover:bg-muted/50')">
                <span
                    [class]="'block truncate text-sm ' + (option.id === currentValue() ? 'font-bold' : 'font-medium')">
                    {{ option.label }}
                </span>
                <span *ngIf="option.description"
                    [class]="'block truncate text-[10px] mt-0.5 ' + (option.id === currentValue() ? 'text-accent/70' : 'text-text-muted')">
                    {{ option.description }}
                </span>
                <!-- Checkmark for selected -->
                <span *ngIf="option.id === currentValue()" class="absolute inset-y-0 right-0 flex items-center pr-4">
                    <div class="w-1.5 h-1.5 rounded-full bg-accent shadow-sm shadow-accent"></div>
                </span>
            </li>
        </ul>

        <ul *ngIf="isOpen() && filteredOptions().length === 0"
            class="absolute z-50 mt-2 w-full overflow-auto rounded-xl bg-white py-4 text-center shadow-xl border border-border-soft animate-in fade-in duration-200">
            <li class="px-4 text-xs font-bold text-text-light">
                No se encontraron resultados
            </li>
        </ul>
    </div>
</div>
