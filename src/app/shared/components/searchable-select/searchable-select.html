<div class="relative w-full">
    <!-- Overlay to close dropdown when clicking outside -->
    <div *ngIf="isOpen()" (click)="isOpen.set(false)" class="fixed inset-0 z-30 cursor-default bg-transparent"></div>

    <div class="relative z-40">
        <div class="relative">
            <input type="text" [ngModel]="searchText()" (ngModelChange)="onSearchChange($event)"
                (focus)="openDropdown()" [placeholder]="placeholder" [disabled]="disabledState()"
                class="block w-full rounded-md border-gray-300 py-2.5 pl-3 pr-10 text-base focus:border-primary focus:outline-none focus:ring-primary sm:text-sm border disabled:bg-gray-100 disabled:text-gray-500 bg-white shadow-sm disabled:shadow-none"
                [ngClass]="{'py-2': displayMode === 'compact', 'py-2.5': displayMode === 'default'}">

            <div class="absolute inset-y-0 right-0 flex items-center pr-2 gap-1">
                <!-- Clear Button -->
                <button *ngIf="currentValue() && !disabledState()" (click)="clearSelection($event)"
                    class="p-1 hover:bg-gray-100 rounded-full transition-colors">
                    <lucide-icon [img]="icons.X" class="h-3.5 w-3.5 text-gray-400 hover:text-red-500"></lucide-icon>
                </button>
                <lucide-icon [img]="icons.Search" class="h-4 w-4 text-gray-400"></lucide-icon>
            </div>
        </div>

        <!-- Dropdown List -->
        <ul *ngIf="isOpen() && filteredOptions().length > 0"
            class="absolute z-50 mt-1 max-h-60 w-full overflow-auto rounded-md bg-white py-1 text-base shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none sm:text-sm">
            <li *ngFor="let option of filteredOptions()" (click)="selectOption(option)"
                [class]="'relative cursor-pointer select-none py-2 pl-3 pr-9 flex flex-col transition-colors ' + 
                         (option.id === currentValue() ? 'bg-blue-50 text-blue-800' : 'text-gray-900 hover:bg-gray-50')">
                <span [class]="'block truncate ' + (option.id === currentValue() ? 'font-bold' : 'font-normal')">
                    {{ option.label }}
                </span>
                <span *ngIf="option.description"
                    [class]="'block truncate text-xs mt-0.5 ' + (option.id === currentValue() ? 'text-blue-600' : 'text-gray-500')">
                    {{ option.description }}
                </span>
                <!-- Checkmark for selected -->
                <span *ngIf="option.id === currentValue()" class="absolute inset-y-0 right-0 flex items-center pr-4">
                    <div class="w-1.5 h-1.5 rounded-full bg-blue-600"></div>
                </span>
            </li>
        </ul>

        <ul *ngIf="isOpen() && filteredOptions().length === 0"
            class="absolute z-50 mt-1 w-full overflow-auto rounded-md bg-white py-1 text-base shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none sm:text-sm">
            <li class="relative cursor-default select-none py-2 pl-3 pr-9 text-gray-500">
                No se encontraron resultados
            </li>
        </ul>
    </div>
</div>
