<div class="relative w-full" [class.z-50]="isOpen()">


    <div class="relative z-40">
        <div class="relative">
            <!-- Icon Alignment: Left-3 -->
            <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                <lucide-icon [img]="icons.Search" class="h-4 w-4 text-text-light"></lucide-icon>
            </div>

            <input type="text" [value]="searchText()" (input)="onSearchChange($event)"
                (focus)="openDropdown()" [placeholder]="placeholder" [disabled]="disabledState()"
                class="block w-full h-11 rounded-lg border border-gray-300 !py-0 pl-10 pr-10 text-[14px] bg-white transition-all outline-none placeholder:text-gray-400 focus:outline-none focus:border-[#4F46E5] focus:ring-2 focus:ring-[#4F46E5]/20 disabled:bg-muted/30 disabled:text-text-muted">

            <div class="absolute inset-y-0 right-3 flex items-center gap-1">
                <!-- Clear Button -->
                <button *ngIf="currentValue() && !disabledState()" (click)="clearSelection($event)"
                    class="p-1 hover:bg-gray-100 rounded-lg transition-colors">
                    <lucide-icon [img]="icons.X" class="h-3.5 w-3.5 text-gray-400 hover:text-red-500"></lucide-icon>
                </button>
            </div>
        </div>

        <!-- Dropdown List -->
        <ul *ngIf="isOpen() && filteredOptions().length > 0"
            class="absolute z-50 mt-2 max-h-60 w-full overflow-auto rounded-xl bg-white p-1 text-sm shadow-2xl border border-gray-100 focus:outline-none custom-scrollbar animate-in fade-in slide-in-from-top-2 duration-200">
            <li *ngFor="let option of filteredOptions()" (click)="selectOption(option)"
                class="relative cursor-pointer select-none py-2.5 pl-4 pr-9 flex flex-col transition-all text-text-main hover:bg-purple-50 hover:text-purple-700"
                [class.bg-purple-50]="option.id === currentValue()"
                [class.text-purple-700]="option.id === currentValue()">
                <span
                    [class.font-bold]="option.id === currentValue()"
                    [class.font-medium]="option.id !== currentValue()"
                    class="block truncate text-sm">
                    {{ option.label }}
                </span>
                <span *ngIf="option.description"
                    class="block truncate text-[10px] mt-0.5"
                    [class.text-purple-600/70]="option.id === currentValue()"
                    [class.text-text-muted]="option.id !== currentValue()">
                    {{ option.description }}
                </span>
                <!-- Checkmark / Indicator for selected -->
                <span *ngIf="option.id === currentValue()" class="absolute inset-y-0 right-0 flex items-center pr-4">
                    <div class="w-1.5 h-1.5 rounded-full bg-purple-600 shadow-sm shadow-purple-200"></div>
                </span>
            </li>
        </ul>

        <ul *ngIf="isOpen() && filteredOptions().length === 0"
            class="absolute z-50 mt-2 w-full overflow-auto rounded-xl bg-white py-4 text-center shadow-xl border border-border-soft animate-in fade-in duration-200">
            <li class="px-4 text-xs font-bold text-text-light">
                No se encontraron resultados
            </li>
        </ul>
    </div>
</div>
